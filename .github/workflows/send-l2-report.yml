name: Send L2 Dashboard Report (DISABLED - Enable After Testing)

# DISABLED: Workflow triggers only on manual "Run workflow" from Actions tab
# Enable after local testing is complete
# 
# To enable automatic triggers when report changes, modify the 'on:' section below:
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'html_reports/L2_Report.html'

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Verify report exists
        run: |
          if [ ! -f "html_reports/L2_Report.html" ]; then
            echo "ERROR: Report file not found!"
            echo "Your local PC should generate html_reports/L2_Report.html first"
            exit 1
          fi
          echo "✓ Report found: $(ls -lh html_reports/L2_Report.html | awk '{print $5, $9}')"
      
      - name: Send L2 Report Email
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python L2_Report_Mail/send_l2_report_smtp.py
      
      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: L2-Report-${{ github.run_number }}
          path: html_reports/L2_Report.html
          retention-days: 30
