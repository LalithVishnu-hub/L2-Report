<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Project Dashboard</title>
	<!-- Google Fonts: Poppins -->
	<link href="https://fonts.googleapis.com/css?family=Poppins:600,700&display=swap" rel="stylesheet">
	<style>
		body { font-family: 'Times New Roman', Times, serif; background: #f4f7fa; }
		.container {
			max-width: 620px;
			margin: 32px auto;
			background: linear-gradient(135deg, rgba(253,246,238,0.5) 0%, rgba(243,247,250,0.5) 100%);
			padding: 22px 1.7rem 1.7rem 1.7rem;
			border-radius: 16px;
			box-shadow: 0 4px 20px rgba(0,0,0,0.11);
			text-align: center;
			font-family: 'Times New Roman', Times, serif;
			backdrop-filter: blur(8px);
			background: rgba(255,255,255,0.55);
			border: 1px solid rgba(255,255,255,0.18);
		}
		h1 { font-size: 1.6em; margin-bottom: 1.1rem; font-weight: 700; letter-spacing: 1px; color: #222; font-family: 'Times New Roman', Times, serif; }
		.button-row {
			display: flex;
			flex-direction: row;
			justify-content: center;
			gap: 1.5rem;
			margin-top: 1.2rem;
		}
		.main-btn {
			font-family: 'Times New Roman', Times, serif;
			font-size: 1.08em;
			font-weight: 600;
			padding: 0.85em 2.2em;
			min-width: 200px;
			border-radius: 8px;
			border: none;
			background: linear-gradient(135deg, #f5e9da 0%, #e9d8c3 100%);
			color: #7a5c2e;
			box-shadow: 0 2px 8px rgba(180, 150, 100, 0.10);
			cursor: pointer;
			transition: background 0.18s, box-shadow 0.18s, color 0.18s;
		}
		.main-btn:hover {
			background: linear-gradient(135deg, #f3d9b2 0%, #e2c799 100%);
			color: #5a3d13;
			box-shadow: 0 8px 24px rgba(180, 150, 100, 0.18);
			transform: scale(1.06);
			transition: all 0.18s cubic-bezier(.4,1.3,.6,1);
		}
		.main-btn.disabled {
			background: #e0e0e0;
			color: #aaa;
			cursor: not-allowed;
			box-shadow: none;
		}
	</style>
	<!-- Table header shadow for depth -->
	<style>
	table th {
		box-shadow: 0 2px 8px rgba(122, 92, 46, 0.10);
		z-index: 1;
		position: relative;
	}
	</style>
	<!-- Fade-in animation for container -->
	<style>
	.container {
		opacity: 0;
		transition: opacity 0.7s cubic-bezier(.4,1.3,.6,1);
	}
	.container.fade-in {
		opacity: 1;
	}
	</style>
</head>
<body style="position:relative; min-height:100vh; background: #f7f3ea;">
<!-- Soft beige wave SVG background -->
<!-- IBM and AT&T Logos -->
<img src="/static/ibm.png" alt="IBM Logo" style="position:fixed; top:24px; left:32px; height:44px; z-index:10; background:transparent; border-radius:8px; padding:4px 10px; box-shadow:0 2px 8px rgba(0,0,0,0.07);">
<img src="/static/att.png" alt="AT&T Logo" style="position:fixed; top:24px; right:32px; height:44px; z-index:10; background:transparent; border-radius:8px; padding:4px 10px; box-shadow:0 2px 8px rgba(0,0,0,0.07);">
<div style="position:fixed; z-index:-1; inset:0; width:100vw; height:100vh; pointer-events:none;">
	<svg width="100%" height="100%" viewBox="0 0 1920 1080" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
		<defs>
			<linearGradient id="beigeGrad" x1="0" y1="0" x2="0" y2="1">
				<stop offset="0%" stop-color="#ede3ce"/>
				<stop offset="100%" stop-color="#f7f3ea"/>
			</linearGradient>
		</defs>
		<rect width="1920" height="1080" fill="url(#beigeGrad)"/>
		<path d="M0,200 Q600,350 1920,120 Q1920,0 0,0 Z" fill="#e8dbc0" fill-opacity="0.45"/>
		<path d="M0,600 Q900,900 1920,400 Q1920,0 0,0 Z" fill="#e2d2b6" fill-opacity="0.32"/>
		<path d="M0,900 Q1200,1200 1920,700 Q1920,0 0,0 Z" fill="#e6dcc5" fill-opacity="0.22"/>
	</svg>
</div>
	<div class="container">
		<h1>Project Dashboard</h1>
		<div class="button-row">
			<button class="main-btn" id="ete-btn">End to End (ETE)</button>
			<button class="main-btn" id="pvt-btn">Production (PVT)</button>
			<button class="main-btn" id="ete-billing-btn">ETE-Billing</button>
		</div>
		<!-- Hourglass loading message outside container -->
		<div id="loading-msg" style="display:none; position: fixed; left: 50%; top: calc(100% + 24px); transform: translate(-50%, 0); z-index: 1000; text-align: center;">
			<svg class="dual-ring-loader" width="54" height="54" viewBox="0 0 54 54" style="display:inline-block; vertical-align:middle;">
				<g class="ring1">
					<circle cx="27" cy="27" r="18" fill="none" stroke="#7a5c2e" stroke-width="4" stroke-linecap="round" stroke-dasharray="28 80"/>
				</g>
				<g class="ring2">
					<circle cx="27" cy="27" r="12" fill="none" stroke="#bfa16a" stroke-width="3" stroke-linecap="round" stroke-dasharray="18 50"/>
				</g>
			</svg>
			<span style="display:block; color:#7a5c2e; font-size:1.1em; font-family:'Poppins', 'Times New Roman', Times, serif; margin-top:0.2em;">Loading ETE Project Status...</span>
		</div>
		<style>
		/* Dual ring loader animation */
		.dual-ring-loader .ring1 {
			transform-origin: 27px 27px;
			animation: spin-cw 1.1s linear infinite;
		}
		.dual-ring-loader .ring2 {
			transform-origin: 27px 27px;
			animation: spin-ccw 1.3s linear infinite;
		}
		@keyframes spin-cw {
			100% { transform: rotate(360deg); }
		}
		@keyframes spin-ccw {
			100% { transform: rotate(-360deg); }
		}
		</style>
		<script>
			document.addEventListener('DOMContentLoaded', function() {
				var container = document.querySelector('.container');
				container.classList.add('fade-in');
				document.getElementById('ete-btn').addEventListener('click', function(e) {
					var loadingMsg = document.getElementById('loading-msg');
					loadingMsg.style.display = 'block';
					// Position below the container
					var rect = container.getBoundingClientRect();
					loadingMsg.style.top = (window.scrollY + rect.bottom + 24) + 'px';
					setTimeout(function() {
						window.location.href = '/ete';
					}, 500);
				});
				document.getElementById('ete-billing-btn').addEventListener('click', function(e) {
					var loadingMsg = document.getElementById('loading-msg');
					loadingMsg.style.display = 'block';
					var rect = container.getBoundingClientRect();
					loadingMsg.style.top = (window.scrollY + rect.bottom + 24) + 'px';
					setTimeout(function() {
						window.location.href = '/ete-billing';
					}, 500);
				});
				document.getElementById('pvt-btn').addEventListener('click', function(e) {
					var loadingMsg = document.getElementById('loading-msg');
					loadingMsg.style.display = 'block';
					var rect = container.getBoundingClientRect();
					loadingMsg.style.top = (window.scrollY + rect.bottom + 24) + 'px';
					setTimeout(function() {
						window.location.href = '/pvt';
					}, 500);
				});
			});
		</script>
	</div>
</body>
</html>
